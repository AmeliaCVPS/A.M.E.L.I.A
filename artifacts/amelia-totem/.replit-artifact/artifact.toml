kind = "web"
previewPath = "/"
title = "A.M.E.L.I.A. — Totem de Triagem"
version = "1.0.0"
id = "artifacts/amelia-totem"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18934

[services.development]
run = "pnpm --filter @workspace/amelia-totem run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/amelia-totem", "run", "build" ]
publicDir = "artifacts/amelia-totem/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18934"
BASE_PATH = "/"
